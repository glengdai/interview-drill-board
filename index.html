<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>面试刷题板</title>
    <meta name="theme-color" content="#d96f32" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="面试刷题板" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="topbar__eyebrow">Interview Drill</p>
          <h1>面试刷题板</h1>
          <p class="topbar__summary">
            首页看投递节奏，点公司进去直接刷题。只保留公司卡片、状态、简历版本和翻卡练习。
          </p>
        </div>
        <button id="reset-progress" class="text-button" type="button">清空记录</button>
      </header>

      <main>
        <section id="board-view" class="board-view">
          <div class="section-heading">
            <div>
              <p class="section-heading__eyebrow">This Week</p>
              <h2>每周投递看板</h2>
            </div>
            <p class="section-heading__summary">
              每张卡片会显示投递状态、简历版本、已刷轮次和已答题进度。
            </p>
          </div>
          <div id="board-sections" class="board-sections"></div>
        </section>

        <section id="detail-view" class="detail-view hidden">
          <div class="detail-header">
            <button id="back-button" class="text-button" type="button">返回首页</button>
            <div>
              <p id="detail-phase" class="detail-header__eyebrow"></p>
              <h2 id="company-name"></h2>
              <p id="company-role" class="detail-header__role"></p>
            </div>
          </div>

          <div class="detail-strip">
            <div id="company-resume" class="info-pill"></div>
            <div id="company-schedule" class="info-pill"></div>
            <div id="company-progress" class="info-pill"></div>
          </div>

          <section class="status-panel">
            <p class="status-panel__label">投递状态</p>
            <div id="company-status-switch" class="status-switch"></div>
          </section>

          <section class="practice-panel">
            <div class="question-toolbar">
              <button id="prev-question" class="icon-button" type="button">上一题</button>
              <div class="question-toolbar__center">
                <strong id="question-counter"></strong>
                <span id="question-type" class="type-pill"></span>
              </div>
              <button id="next-question" class="icon-button" type="button">下一题</button>
            </div>

            <div class="flashcard-shell">
              <article id="flashcard" class="flashcard">
                <div class="flashcard__face flashcard__face--front">
                  <p class="flashcard__label">问题</p>
                  <h3 id="card-question"></h3>
                  <div id="card-prompts" class="prompt-list"></div>
                  <button id="flip-card" class="primary-button" type="button">翻到答案</button>
                </div>
                <div class="flashcard__face flashcard__face--back">
                  <p class="flashcard__label">参考答案</p>
                  <div id="card-answer" class="reference-answer"></div>
                  <button id="flip-card-back" class="ghost-button" type="button">回到问题</button>
                </div>
              </article>
            </div>

            <div class="answer-panel">
              <label for="answer-input">你的回答</label>
              <textarea
                id="answer-input"
                placeholder="直接在这里写，页面会自动保存这一题。"
              ></textarea>
              <div class="answer-panel__footer">
                <span id="save-note">自动保存中</span>
                <button id="clear-answer" class="ghost-button" type="button">清空这一题</button>
              </div>
            </div>

            <div id="question-jumps" class="question-jumps"></div>
          </section>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
