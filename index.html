<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interview Drill Board</title>
    <meta name="theme-color" content="#d96f32" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Interview Drill" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <section id="board-view" class="screen board-view">
        <div class="utility-bar">
          <button id="reset-progress" class="ghost-button" type="button">清空记录</button>
        </div>
        <div id="board-sections" class="board-sections"></div>
      </section>

      <section id="detail-view" class="screen detail-view hidden">
        <div class="detail-toolbar">
          <button id="back-button" class="ghost-button" type="button">返回首页</button>
          <div id="slide-indicator" class="slide-indicator"></div>
          <div class="detail-toolbar__nav">
            <button id="prev-slide" class="ghost-button" type="button">上一张</button>
            <button id="next-slide" class="primary-button" type="button">下一张</button>
          </div>
        </div>

        <div id="card-stage" class="card-stage">
          <article id="swipe-card" class="swipe-card"></article>
        </div>
      </section>

      <div id="finish-modal" class="finish-modal hidden">
        <div class="finish-modal__panel">
          <p class="finish-modal__eyebrow">这一轮完成了</p>
          <h2>回首页还是继续这家公司？</h2>
          <p id="finish-message" class="finish-modal__summary"></p>
          <div class="finish-modal__actions">
            <button id="finish-home" class="ghost-button" type="button">回首页</button>
            <button id="finish-stay" class="primary-button" type="button">继续这家公司</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
